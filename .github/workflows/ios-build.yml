name: iOS Build (unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -workspace ios/iron.xcworkspace \
            -scheme iron \
            -configuration Release \
            -archivePath $RUNNER_TEMP/iron.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA
        run: |
          cd $RUNNER_TEMP/iron.xcarchive/Products/Applications
          mkdir Payload
          cp -r *.app Payload/
          zip -r $RUNNER_TEMP/iron-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iron-unsigned
          path: ${{ runner.temp }}/iron-unsigned.ipa
          retention-days: 7
