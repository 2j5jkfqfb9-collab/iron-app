workflows:
  ios-unsigned:
    name: iOS App (unsigned)
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Prebuild Expo (generate iOS project)
        script: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS unsigned archive
        script: |
          xcodebuild \
            -workspace ios/iron.xcworkspace \
            -scheme iron \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/iron.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA
        script: |
          cd $CM_BUILD_DIR/iron.xcarchive/Products/Applications
          mkdir Payload
          cp -r *.app Payload/
          zip -r $CM_BUILD_DIR/app-unsigned.ipa Payload/

    artifacts:
      - $CM_BUILD_DIR/app-unsigned.ipa

    publishing:
      email:
        recipients:
          - michaeldewilligen@gmail.com
